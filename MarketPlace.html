<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Marketplace TPSIT - Versione Classic</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.4.1/jspdf.debug.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .card { 
            border: 1px solid #ddd; 
            padding: 15px; 
            margin: 10px; 
            width: 200px; 
            display: inline-block; 
            background: #fff;
        }
        #area-acquisto { 
            display: none; 
            margin-top: 20px; 
            padding: 20px; 
            border-top: 2px solid #333; 
            background: #f9f9f9;
        }
        input { margin-bottom: 10px; padding: 5px; width: 250px; }
        button { cursor: pointer; padding: 5px 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Vetrina Prodotti (Libreria 1.4.1)</h1>
    
    <label>Carica catalogo CSV: </label>
    <input type="file" id="mio-file" accept=".csv">
    
    <div id="vetrina"></div>

    <div id="area-acquisto">
        <h3>Dati Acquirente</h3>
        <p>Prodotto scelto: <b id="prodotto-scelto"></b></p>
        
        <input type="text" id="nome" placeholder="Inserisci Nome"><br>
        <input type="email" id="email" placeholder="Inserisci Email"><br>
        
        <button onclick="salvaPDF()">Genera PDF</button>
    </div>
</div>

<script>
    let nomeArticolo = "";
    let prezzoArticolo = "";

    const fileInput = document.getElementById('mio-file');

    fileInput.onchange = function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = function(evento) {
            const contenuto = evento.target.result;
            mostraProdotti(contenuto);
        };
        reader.readAsText(file);
    };

    function mostraProdotti(dati) {
        const vetrina = document.getElementById('vetrina');
        vetrina.innerHTML = ""; 

        const righe = dati.split('\n');

        for (let i = 1; i < righe.length; i++) {
            const colonne = righe[i].split(',');

            if (colonne.length >= 4) {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = "<b>" + colonne[0] + "</b><br>" +
                                "<h3>" + colonne[1] + "</h3>" +
                                "<p>" + colonne[2] + "</p>" +
                                "<b>" + colonne[3] + " €</b><br><br>" +
                                "<button onclick='seleziona(\""+colonne[1]+"\", \""+colonne[3]+"\")'>Scegli</button>";
                vetrina.appendChild(div);
            }
        }
    }

    function seleziona(n, p) {
        nomeArticolo = n;
        prezzoArticolo = p;
        document.getElementById('prodotto-scelto').innerText = n + " (" + p + "€)";
        document.getElementById('area-acquisto').style.display = "block";
    }

    function salvaPDF() {
        const nUtente = document.getElementById('nome').value;
        const eUtente = document.getElementById('email').value;

        if (nUtente == "" || eUtente == "") {
            alert("Compila i campi!");
            return;
        }

        /* DIFFERENZA IMPORTANTE: 
           Con la versione 1.4.1 non serve la riga "const { jsPDF } = window.jspdf;"
           Si crea l'oggetto direttamente così:
        */
        var doc = new jsPDF();

        doc.text("RICEVUTA ORDINE", 20, 20);
        doc.text("Cliente: " + nUtente, 20, 40);
        doc.text("Email: " + eUtente, 20, 50);
        doc.text("Articolo: " + nomeArticolo, 20, 70);
        doc.text("Prezzo: " + prezzoArticolo + " Euro", 20, 80);

        doc.save("ricevuta.pdf");
    }
</script>

</body>
</html>
