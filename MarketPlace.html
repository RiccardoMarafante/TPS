<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Marketplace</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.4.1/jspdf.debug.js"></script>
    
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .card { 
            border: 1px solid #ddd; padding: 15px; margin: 10px; width: 200px; 
            display: inline-block; vertical-align: top; background: #fff; text-align: center;
        }
        #area-acquisto { 
            display: none; margin-top: 30px; padding: 20px; 
            background: #fdfdfd; border: 2px solid #333; 
        }
        input { margin: 5px 0; padding: 8px; width: 80%; }
        button { cursor: pointer; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Marketplace</h1>
    
    <p>1. Seleziona il file CSV:</p>
    <input type="file" id="file-input" accept=".csv">
    
    <div id="vetrina"></div>

    <div id="area-acquisto">
        <h3>2. Registrazione e Acquisto</h3>
        <p>Prodotto scelto: <span id="nome-prodotto" style="font-weight:bold; color:blue;"></span></p>
        
        <input type="text" id="campo-nome" placeholder="Tuo Nome"><br>
        <input type="text" id="campo-email" placeholder="Tua Email"><br>
        
        <button onclick="generaRicevuta()">Conferma e Scarica PDF</button>
    </div>
</div>

<script>
    let articoloScelto = "";
    let prezzoScelto = "";

    let input = document.getElementById('file-input');

    input.onchange = function(e) {
        let file = e.target.files[0];

        let lettore = new FileReader();
        lettore.onload = function(evento) {
            creaVetrina(evento.target.result);
        };
        lettore.readAsText(file);
    };

    function creaVetrina(testo) {
        let vetrina = document.getElementById('vetrina');
        let righe = testo.split('\n');
        let htmlFinale = "";

        for (let i = 1; i < righe.length; i++) {
            let riga = righe[i].trim().split(',');

            if (riga.length >= 4) {
                htmlFinale += "<div class='card'>";
                htmlFinale += "<b>" + riga[0] + "</b><br>";
                htmlFinale += "<h3>" + riga[1] + "</h3>";
                htmlFinale += "<p>" + riga[2] + "</p>";
                htmlFinale += "<b>" + riga[3] + " €</b><br><br>";
                htmlFinale += "<button data-nome='" + riga[1] + "' data-prezzo='" + riga[3] + "' onclick='selezionaDagliAttributi(this)'>Scegli</button>";
                htmlFinale += "</div>";
            }
        }
        vetrina.innerHTML = htmlFinale;
    }
    function selezionaDagliAttributi(elemento) {
    var nome = elemento.getAttribute("data-nome");
    var prezzo = elemento.getAttribute("data-prezzo");
    seleziona(nome, prezzo);
}
    function seleziona(nome, prezzo) {
        articoloScelto = nome;
        prezzoScelto = prezzo;

        document.getElementById('nome-prodotto').innerHTML = nome + " (" + prezzo + " €)";
        document.getElementById('area-acquisto').style.display = "block";
    
    }

    function generaRicevuta() {
        let n = document.getElementById('campo-nome').value;
        let e = document.getElementById('campo-email').value;

        if (n == "" || e == "") {
            alert("Compila tutti i campi!");
            return;
        }

        let doc = new jsPDF();
        doc.text("RICEVUTA DI ACQUISTO", 20, 20);
        doc.text("Cliente: " + n, 20, 40);
        doc.text("Email: " + e, 20, 50);
        doc.text("Prodotto: " + articoloScelto, 20, 70);
        doc.text("Prezzo: " + prezzoScelto + " Euro", 20, 80);
        
        doc.save("ricevuta.pdf");
    }
</script>

</body>
</html>
