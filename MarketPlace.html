<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Marketplace TPSIT - Tradizionale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.4.1/jspdf.debug.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .card { 
            border: 1px solid #ccc; 
            padding: 15px; 
            margin: 10px; 
            width: 200px; 
            display: inline-block; 
            vertical-align: top;
            background: #fff;
        }
        #area-acquisto { display: none; margin-top: 20px; padding: 20px; border-top: 2px solid #333; background: #eee; }
        input { margin-bottom: 10px; padding: 5px; width: 250px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Marketplace Semplificato</h1>
    
    <label>Carica il catalogo CSV: </label>
    <input type="file" id="input-file" accept=".csv">
    
    <div id="vetrina"></div>

    <div id="area-acquisto">
        <h3>Dati per l'ordine</h3>
        <p>Stai acquistando: <b id="nome-prodotto"></b></p>
        
        <input type="text" id="campo-nome" placeholder="Inserisci il tuo Nome"><br>
        <input type="text" id="campo-email" placeholder="Inserisci la tua Email"><br>
        
        <button onclick="generaRicevuta()">🛒 Scarica Ricevuta PDF</button>
    </div>
</div>

<script>
    var articoloScelto = "";
    var prezzoScelto = "";

    var fileInput = document.getElementById('input-file');

    fileInput.onchange = function(e) {
        var file = e.target.files[0];
        var lettore = new FileReader();

        lettore.onload = function(evento) {
            var testoCsv = evento.target.result;
            creaVetrina(testoCsv);
        };
        lettore.readAsText(file);
    };

    function creaVetrina(dati) {
        var vetrina = document.getElementById('vetrina');
        var righe = dati.split('\n');
        var codiceHtml = "";

        for (var i = 1; i < righe.length; i++) {
            var riga = righe[i].split(',');

            if (riga.length >= 4) {
                codiceHtml += "<div class='card'>";
                codiceHtml += "<b>" + riga[0] + "</b>";
                codiceHtml += "<h3>" + riga[1] + "</h3>";
                codiceHtml += "<p>" + riga[2] + "</p>";
                codiceHtml += "<b>" + riga[3] + " €</b><br><br>";
                codiceHtml += "<button onclick=\"seleziona('" + riga[1] + "', '" + riga[3] + "')\">Scegli</button>";
                codiceHtml += "</div>";
            }
        }

        vetrina.innerHTML = codiceHtml;
    }

    function seleziona(nome, prezzo) {
        articoloScelto = nome;
        prezzoScelto = prezzo;

        document.getElementById('nome-prodotto').innerHTML = nome + " (" + prezzo + " €)";
        document.getElementById('area-acquisto').style.display = "block";
    }
    
    function generaRicevuta() {
        var nomeUtente = document.getElementById('campo-nome').value;
        var emailUtente = document.getElementById('campo-email').value;

        if (nomeUtente == "" || emailUtente == "") {
            alert("Compila tutti i campi di registrazione!");
        } else {
            var doc = new jsPDF();

            doc.text("CONFERMA DI ACQUISTO", 20, 20);
            doc.text("Acquirente: " + nomeUtente, 20, 40);
            doc.text("Email: " + emailUtente, 20, 50);
            doc.text("Oggetto: " + articoloScelto, 20, 75);
            doc.text("Prezzo: " + prezzoScelto + " Euro", 20, 85);

            doc.save("ordine.pdf");
        }
    }
</script>

</body>
</html>
